# =============================================================
# amcl.yaml — adaptive Monte-Carlo localisation
# Frames and topics MUST match what the rest of the stack uses:
#   /scan              <-- lidar
#   odom frame         <-- odometry from diff_drive
#   base_link frame    <-- root link of the URDF
#   map frame          <-- published by AMCL (owns map->odom)
# =============================================================
amcl:
  ros__parameters:
    use_sim_time: true

    # Frame configuration (matches SLAM and check1 bringup exactly)
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: /scan

    # Motion model: differential drive
    robot_model_type: nav2_amcl::DifferentialMotionModel
    alpha1: 0.2   # rotation noise from rotation
    alpha2: 0.2   # rotation noise from translation
    alpha3: 0.2   # translation noise from translation
    alpha4: 0.2   # translation noise from rotation
    alpha5: 0.2

    # Sensor (lidar) model
    laser_model_type: likelihood_field
    laser_min_range: -1.0            # use lidar's own min
    laser_max_range: 10.0
    max_beams: 120
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1

    # Particle filter
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    update_min_a: 0.2
    update_min_d: 0.25
    resample_interval: 1
    transform_tolerance: 1.0

    # Initial pose — robot is spawned at (0,0,0.15, yaw 0) in check1.launch.py
    set_initial_pose: true
    always_reset_initial_pose: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    tf_broadcast: true
    save_pose_rate: 0.5
    first_map_only: false

# =============================================================
# map_server — serves the static occupancy grid to AMCL
# =============================================================
map_server:
  ros__parameters:
    use_sim_time: true
    # topic_name / frame_id are the defaults (/map, "map"), left explicit for clarity
    topic_name: map
    frame_id: map
    # yaml_filename is supplied on the command line from the launch file
